<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uhud Savaşı Simülasyonu</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family: 'Nunito', sans-serif; background:#F5ECD7; min-height:100vh; padding:10px 8px}
button, input, select, textarea { font-family: 'Nunito', sans-serif; }

.wrap{max-width:650px;margin:0 auto}
.header{background:linear-gradient(135deg,#1B3A2D,#0D7C66);border-radius:14px;padding:12px 16px;margin-bottom:10px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:18px;font-weight:800;margin:0}
.header .sub{font-size:10px;opacity:.7;margin-top:2px}
.stats{display:flex;gap:16px}
.stats div{text-align:center}
.stats .lbl{font-size:9px;opacity:.6}
.stats .val{font-weight:800;font-size:18px}
.timeline{display:flex;gap:3px;margin-bottom:10px;overflow-x:auto;padding:0 2px}

/* Buton rakamları kalınlaştırıldı ve büyütüldü */
.timeline button{height:30px;border-radius:8px;font-weight:800;cursor:pointer;white-space:nowrap;padding:0 6px;transition:all .2s;flex:1 1 auto; font-size:13px;}

.map-wrap{
    width:100%;
    aspect-ratio: 1.45; 
    margin-bottom: 10px;
    background:#FFFDF7;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    border:1px solid #D4C4A0;
    animation: fadeBlur 0.6s ease-out forwards;
}
.map-wrap.crit{border:2px solid #C0392B;box-shadow:0 4px 20px rgba(192,57,43,.2)}
.card{
    background:#FFFDF7;
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:10px;
    border:1px solid #D4C4A0;
    animation: fadeBlur 0.6s ease-out forwards;
}

@keyframes fadeBlur {
    0% { opacity: 0; filter: blur(6px); transform: translateY(3px); }
    100% { opacity: 1; filter: blur(0); transform: translateY(0); }
}

/* Metinler için sade büyüme animasyonu */
@keyframes textPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.10); }
}
.pulse-text, .pulse-text-d1, .pulse-text-d2 {
    transform-box: fill-box;
    transform-origin: center;
    animation: textPulse 1.4s ease-in-out infinite;
}

.badge{display:inline-block;color:#fff;border-radius:20px;padding:3px 12px;font-size:10px;font-weight:700}
.phase-title{font-size:15px;font-weight:700;color:#1B3A2D}
.phase-date{font-size:9px;color:#8B7D6B;margin-left:auto}
.desc{font-size:13px;color:#2C1810;line-height:1.6;margin:0 0 10px}
.cmd-box{background:#FEF3E2;border-left:3px solid #B8860B;border-radius:0 8px 8px 0;padding:6px 10px;margin-bottom:10px;font-size:12px;color:#7D5A00;font-style:italic}
.verse-box{background:#F0F7F4;border-left:3px solid #0D7C66;border-radius:0 8px 8px 0;padding:6px 10px;margin-bottom:10px;font-size:12px;color:#0D7C66}
.lesson-box{background:#FDF8E8;border-radius:8px;padding:6px 10px;font-size:12px;color:#6B5B00;border-left:3px solid #F1C40F}
.heroes-toggle{display:flex;justify-content:space-between;cursor:pointer;padding:4px 0}
.heroes-toggle span:first-child{font-size:13px;font-weight:700;color:#1B3A2D}
.heroes-toggle span:last-child{font-size:10px;color:#8B7D6B}
.heroes-grid{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.hero-card{background:#F8F5EE;border-radius:8px;padding:7px 10px;border-left:3px solid #0D7C66}
.hero-card .name{font-weight:700;font-size:12px;color:#1B3A2D}
.hero-card .detail{font-size:10px;color:#8B7D6B;margin-top:2px}
table{width:100%;font-size:11px;border-collapse:collapse}
th{text-align:center;padding:4px;border-bottom:1px solid #D4C4A0}
td{padding:4px}
.controls{position:sticky;bottom:0;background:linear-gradient(0deg,#F5ECD7 80%,transparent);padding:10px 0 6px}
.controls .btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;border:1px solid #D4C4A0;background:#FFFDF7;color:#2C1810;transition:all .2s}
.btn:disabled{opacity:.4;cursor:default}
.btn.accent{background:#0D7C66;color:#fff;border:none}
.btn.accent.stop{background:#C0392B}
.btn.muted{background:#95A5A6;color:#fff;border:none}
.src{text-align:center;font-size:8px;color:#8B7D6B;margin:6px 0 0}

svg text {
    paint-order: stroke fill;
    stroke-linejoin: round;
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var DATA = [

  {title:"En Şiddetli Anlar",
   text:"Hz. Hamza şehit oldu. Sancaktar Musab bin Umeyr şehit düşünce , “Resulullah öldü.” söylentisi yayıldı. Sahabiler canlarını siper ederek Peygamberimizi korudu.",lesson:"Fedakârlık: Sahabiler hayatlarını ortaya koyarak Resulullah'ı korudu.",

  {title:"Savaşın Sonu",

var idx = 0;
var playing = false;
var heroesOpen = false;
var timer = null;
function buildSVG(d) {
  var s = '';
  s += '<svg viewBox="0 0 145 100" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;background:#DCC9A3">';
  s += '<defs>';
  s += '<symbol id="base-flag" viewBox="0 0 10 15">';

  s += '<symbol id="musrik-soldier" viewBox="0 0 10 15">';

  s += '<line x1="8" y1="1" x2="9.5" y2="15" stroke="#222" stroke-width="0.8"/>'; 
  s += '<circle cx="2.5" cy="7.5" r="2.2" fill="#7B1113" stroke="black" stroke-width="0.4"/>';

  s += '<symbol id="musrik-horseman" viewBox="0 0 18 15">';
  s += '<path d="M3,10 L3,14 M6,10 L5,14 M13,10 L13,14 M16,10 L15,14" stroke="#5C4033" stroke-width="1.2"/>';

  s += '<path d="M15,8 Q17,3 18,4 Q16,8 15,8 Z" fill="#8B5A2B"/>'; 
  s += '<path d="M3,9 Q1,11 1,13" stroke="#3E2723" stroke-width="1" fill="none"/>'; 
  s += '<circle cx="9" cy="2" r="1.8" fill="black"/>'; 
  s += '<path d="M7,5 L11,5 L11.5,9 L6.5,9 Z" fill="black"/>'; 
  s += '<line x1="11" y1="0" x2="13" y2="12" stroke="#222" stroke-width="0.8"/>'; 
  s += '<circle cx="5" cy="6" r="2.2" fill="#7B1113" stroke="black" stroke-width="0.4"/>'; 
  s += '</symbol>';
  s += '<symbol id="base-horseman" viewBox="0 0 18 15">';
  s += '<path d="M3,10 L3,14 M6,10 L5,14 M13,10 L13,14 M16,10 L15,14" stroke="#5C4033" stroke-width="1.2"/>';

    s += '<text class="pulse-text" x="'+(d.mx-1)+'" y="'+(d.my + 22 )+'" text-anchor="middle" fill="#044721" stroke="#FFF" stroke-width="0.05" font-size="3" font-weight="900">Koruma Halkası</text>';
    s += '<line x1="'+(d.qx + 16)+'" y1="'+(d.qy +1 )+'" x2="'+(d.mx - 9)+'" y2="'+(d.my + 14)+'" stroke="#7B1113" stroke-width="1.2" stroke-dasharray="2,1.5">'+anim+'</line>';
    s += '<line x1="'+(d.kx - 9)+'" y1="'+(d.ky + 0)+'" x2="'+(d.mx + 7)+'" y2="'+(d.my + 15)+'" stroke="#7B1113" stroke-width="1.2" stroke-dasharray="2,1.5">'+anim+'</line>';
  }

  if (d.showRetreat) {
    s += '<line x1="'+(d.mx + 10)+'" y1="'+(d.my - 6)+'" x2="125" y2="10" stroke="#044721" stroke-width="1.2" stroke-dasharray="2,1.5">'+anim+'</line>';
    s += '<text class="pulse-text" x="'+d.mx+'" y="'+(d.my + 22)+'" text-anchor="middle" fill="#044721" stroke="#FFF" stroke-width="0.1" font-size="3.5" font-weight="900">Dağa çekilme</text>';
  }

  if (d.critical) {
    s += '<rect x="30" y="93" width="85" height="5" rx="2.5" fill="#E74C3C" opacity="0.95"/>';
    s += '<text x="72.5" y="96.5" text-anchor="middle" fill="white" font-weight="900" font-size="2.5">⚠ KRİTİK DÖNÜM NOKTASI ⚠</text>';
  }
  s += '</svg>';
  return s;
}
function render() {
  var d = DATA[idx];
  var html = '';
  html += '<div class="header"><div><h1>Uhud Savaşı Simülasyonu</h1><div class="sub">Etkileşimli Savaş Haritası | Miladi 625 / Hicri 3</div></div>';
  
  if (idx !== 3 && idx !== 4 && idx !== 5) {
    html += '<div class="stats">';
    html += '<div><div class="lbl">Müslümanlar</div><div class="val" style="color:#7DCEA0">'+(d.mus-d.sehit)+'</div></div>';
    html += '<div><div class="lbl">Müşrikler</div><div class="val" style="color:#F1948A">'+(d.qur - d.q_olu)+'</div></div>';
    html += '<div><div class="lbl">Şehit</div><div class="val" style="color:#F9E79F">'+d.sehit+'</div></div>';
    html += '</div>';
  }
  
  html += '</div>';
  html += '<div class="timeline">';
  DATA.forEach(function(x, i) {
    var active = i === idx;
    var bg = active ? (x.critical ? '#FDEDEC' : '#E8F6F3') : (i < idx ? '#EAF2EF' : '#FFFDF7');
    var clr = active ? (x.critical ? '#C0392B' : '#0D7C66') : (i < idx ? '#0D7C66' : '#8B7D6B');
    var bdr = active ? '2px solid '+(x.critical?'#C0392B':'#0D7C66') : '1px solid #D4C4A0';
    html += '<button onclick="goTo('+i+')" style="background:'+bg+';color:'+clr+';border:'+bdr+';font-weight:'+(active?800:800)+'">';
    html += active ? (i+1)+'. '+x.title : (i+1);
    html += '</button>';
  });
  html += '</div>';
  html += '<div class="map-wrap'+(d.critical?' crit':'')+'">'+buildSVG(d)+'</div>';
  html += '<div class="card">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">';
  html += '<span class="badge" style="background:'+(d.critical?'#C0392B':'#0D7C66')+'">Safha '+(idx+1)+'</span>';
  html += '<span class="phase-title">'+d.title+'</span>';
  
  // HATANIN ÇÖZÜMÜ: Eğer date (tarih) verisi yoksa boş bırak, undefined yazdırma.
  if (d.date) {
    html += '<span class="phase-date">'+d.date+'</span>';
  } else {
    html += '<span class="phase-date"></span>';
  }
  
  html += '</div>';
  html += '<p class="desc">'+d.text+'</p>';
  if (d.cmd) html += '<div class="cmd-box">⚔️ Peygamberimizin Emri: "'+d.cmd+'"</div>';
  if (d.verse) html += '<div class="verse-box"><strong>📖 '+d.verse+'</strong></div>';
  
  if (idx === 2) {
    html += '<div class="lesson-box"><strong>♟️</strong> '+d.lesson+'</div>';
  } else if (idx === 6) {
    html += '<div class="lesson-box"><strong>🏁 Sonuç:</strong> '+d.lesson+'</div>';
  } else {
    html += '<div class="lesson-box"><strong>📚 Ders:</strong> '+d.lesson+'</div>';
  }
  
  html += '</div>';
  if (d.heroes) {
    html += '<div class="card">';
    html += '<div class="heroes-toggle" onclick="toggleHeroes()"><span>🛡️ Uhud Kahramanları ('+d.heroes.length+')</span><span>'+(heroesOpen?'▲ Gizle':'▼ Göster')+'</span></div>';
    if (heroesOpen) {
      html += '<div class="heroes-grid">';
      d.heroes.forEach(function(h) {
        var parts = h.split(' – ');
        html += '<div class="hero-card"><div class="name">'+parts[0]+'</div>';
        if (parts[1]) html += '<div class="detail">'+parts[1]+'</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }
  if (idx === 1) {
    html += '<div class="card">';
    html += '<div style="font-size:12px;font-weight:700;color:#1B3A2D;margin-bottom:6px">⚔️ Ordu Karşılaştırması</div>';
    html += '<table><thead><tr><th style="text-align:left"></th><th style="color:#0D7C66">Müslüman</th><th style="color:#922B21">Müşrik</th></tr></thead><tbody>';
    [['Toplam',d.mus,(d.qur - d.q_olu)],['Zırhlı',100,700],['Süvari',2,200],['Okçu',50,'–']].forEach(function(r,i){
      html += '<tr style="background:'+(i%2===0?'#F8F5EE':'transparent')+'"><td style="font-weight:600">'+r[0]+'</td><td style="text-align:center;color:#0D7C66">'+r[1]+'</td><td style="text-align:center;color:#922B21">'+r[2]+'</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '<div class="controls"><div class="btns">';
  html += '<button class="btn" onclick="goTo(idx-1)"'+(idx===0?' disabled':'')+'>◀ Geri</button>';
  html += '<button class="btn accent'+(playing?' stop':'')+'" onclick="togglePlay()" style="min-width:90px">'+(playing?'⏸ Durdur':'▶ Oynat')+'</button>';
  html += '<button class="btn" onclick="goTo(idx+1)"'+(idx===DATA.length-1?' disabled':'')+'>İleri ▶</button>';
  html += '<button class="btn muted" onclick="resetSim()">↺ Sıfırla</button>';
  html += '</div>';
  html += '<p class="src">Uhud Savaşı Simülasyonu</p>';
  html += '</div>';
  document.getElementById('app').innerHTML = html;
}
function goTo(n) {
  if (n < 0 || n >= DATA.length) return;
  idx = n;
  heroesOpen = false;
  render();
}
function togglePlay() {
  playing = !playing;
  if (playing) {
    timer = setInterval(function() {
      if (idx >= DATA.length - 1) { playing = false; clearInterval(timer); render(); return; }
      idx++;
      heroesOpen = false;
      render();
    }, 5000);
  } else {
    clearInterval(timer);
  }
  render();
}
function resetSim() {
  playing = false;
  clearInterval(timer);
  idx = 0;
  heroesOpen = false;
  render();
}
function toggleHeroes() {
  heroesOpen = !heroesOpen;
  render();
}
render();
</script>
</body>
</html>
